<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - TicketSaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-ticket-alt me-2"></i>TicketSaaS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="organizations.html"><i class="fas fa-building me-1"></i>Organizations</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html"><i class="fas fa-project-diagram me-1"></i>Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="tickets.html"><i class="fas fa-ticket-alt me-1"></i>Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="sprints.html"><i class="fas fa-running me-1"></i>Sprints</a></li>
                    <li class="nav-item"><a class="nav-link active" href="reports.html"><i class="fas fa-chart-bar me-1"></i>Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="webhooks.html"><i class="fas fa-plug me-1"></i>Webhooks</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link position-relative" href="#" id="notificationBell" role="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                            <i class="fas fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display:none; font-size:0.6rem;">0</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end p-0" id="notificationDropdown">
                            <div class="text-center text-muted py-3 px-3" style="min-width: 320px;">Loading...</div>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-user-cog me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Reports</h1>
            <div>
                <button class="btn btn-outline-success me-2" id="exportCsvBtn" disabled>
                    <i class="fas fa-file-csv me-1"></i>Export CSV
                </button>
                <button class="btn btn-outline-primary" id="exportJsonBtn" disabled>
                    <i class="fas fa-file-code me-1"></i>Export JSON
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Organization</label>
                        <select class="form-select" id="reportOrg">
                            <option value="">Select organization...</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Project</label>
                        <select class="form-select" id="reportProject">
                            <option value="">All projects</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="reportStart">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control" id="reportEnd">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" id="generateReportBtn" disabled>
                            <i class="fas fa-chart-pie me-1"></i>Generate Report
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Report Results -->
        <div id="reportResults">
            <div class="text-center text-muted py-5">
                <i class="fas fa-chart-line fa-3x mb-3"></i>
                <p>Select an organization and generate a report to see results.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/services.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
