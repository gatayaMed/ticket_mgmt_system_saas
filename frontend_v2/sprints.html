<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprints - TicketSaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-ticket-alt me-2"></i>TicketSaaS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html"><i class="fas fa-home me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="organizations.html"><i class="fas fa-building me-1"></i>Organizations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projects.html"><i class="fas fa-project-diagram me-1"></i>Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tickets.html"><i class="fas fa-ticket-alt me-1"></i>Tickets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="sprints.html"><i class="fas fa-running me-1"></i>Sprints</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="reports.html"><i class="fas fa-chart-bar me-1"></i>Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="webhooks.html"><i class="fas fa-plug me-1"></i>Webhooks</a>
                    </li>
                    <!-- Notification Bell -->
                    <li class="nav-item dropdown">
                        <a class="nav-link position-relative" href="#" id="notificationBell" role="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                            <i class="fas fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display:none; font-size:0.6rem;">0</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end p-0" id="notificationDropdown">
                            <div class="text-center text-muted py-3 px-3" style="min-width: 320px;">
                                <div class="spinner-border spinner-border-sm" role="status"></div>
                                <p class="mb-0 small mt-1">Loading...</p>
                            </div>
                        </div>
                    </li>
                    <!-- User Menu -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-user-cog me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Sprints</h1>
                <p class="text-muted" id="projectInfo">Select a project to view sprints</p>
            </div>
            <button class="btn btn-primary" id="createSprintBtn" disabled data-bs-toggle="modal" data-bs-target="#createSprintModal">
                <i class="fas fa-plus me-1"></i>New Sprint
            </button>
        </div>

        <!-- Project Selector & Search -->
        <div class="row mb-4">
            <div class="col-md-4">
                <select class="form-select" id="projectSelector">
                    <option value="">Select a project...</option>
                </select>
            </div>
            <div class="col-md-4 ms-auto">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search entities...">
                </div>
            </div>
        </div>

        <!-- Sprints List -->
        <div id="sprintsContainer">
            <div class="text-center text-muted py-5">Select a project to view sprints.</div>
        </div>
    </div>

    <!-- Create Sprint Modal -->
    <div class="modal fade" id="createSprintModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Sprint</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="createSprintForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="sprintName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Goal</label>
                            <textarea class="form-control" id="sprintGoal" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="datetime-local" class="form-control" id="sprintStart" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date</label>
                                <input type="datetime-local" class="form-control" id="sprintEnd" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Sprint</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Sprint Detail Modal -->
    <div class="modal fade" id="sprintDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="sprintDetailTitle">Sprint Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="sprintDetailBody">
                    <div class="text-center py-5">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/services.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/sprints.js"></script>
</body>
</html>
