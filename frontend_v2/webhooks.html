<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhooks - TicketSaaS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-ticket-alt me-2"></i>TicketSaaS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="organizations.html"><i class="fas fa-building me-1"></i>Organizations</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html"><i class="fas fa-project-diagram me-1"></i>Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="tickets.html"><i class="fas fa-ticket-alt me-1"></i>Tickets</a></li>
                    <li class="nav-item"><a class="nav-link" href="sprints.html"><i class="fas fa-running me-1"></i>Sprints</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html"><i class="fas fa-chart-bar me-1"></i>Reports</a></li>
                    <li class="nav-item"><a class="nav-link active" href="webhooks.html"><i class="fas fa-plug me-1"></i>Webhooks</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link position-relative" href="#" id="notificationBell" role="button" data-bs-toggle="dropdown" onclick="loadNotifications()">
                            <i class="fas fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notificationBadge" style="display:none; font-size:0.6rem;">0</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end p-0" id="notificationDropdown">
                            <div class="text-center text-muted py-3 px-3" style="min-width: 320px;">Loading...</div>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-user-cog me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Webhooks</h1>
                <p class="text-muted">Configure external integrations and event triggers</p>
            </div>
            <button class="btn btn-primary" id="createWebhookBtn" disabled data-bs-toggle="modal" data-bs-target="#createWebhookModal">
                <i class="fas fa-plus me-1"></i>Add Webhook
            </button>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <select class="form-select" id="webhookOrg">
                    <option value="">Select organization...</option>
                </select>
            </div>
        </div>

        <div id="webhooksContainer">
            <div class="text-center text-muted py-5">
                <i class="fas fa-plug fa-3x mb-3"></i>
                <p>Select an organization to view webhooks.</p>
            </div>
        </div>
    </div>

    <!-- Create Webhook Modal -->
    <div class="modal fade" id="createWebhookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Webhook</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="createWebhookForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="webhookName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL</label>
                            <input type="url" class="form-control" id="webhookUrl" placeholder="https://..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Events</label>
                            <div id="eventCheckboxes">
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="ticket.created" checked><label class="form-check-label">Ticket Created</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="ticket.updated"><label class="form-check-label">Ticket Updated</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="ticket.status_changed"><label class="form-check-label">Ticket Status Changed</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="ticket.assigned"><label class="form-check-label">Ticket Assigned</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="comment.added"><label class="form-check-label">Comment Added</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="project.created"><label class="form-check-label">Project Created</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="project.updated"><label class="form-check-label">Project Updated</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="sprint.started"><label class="form-check-label">Sprint Started</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" value="sprint.completed"><label class="form-check-label">Sprint Completed</label></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Webhook</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/services.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/webhooks.js"></script>
</body>
</html>
