version: '3.8'

services:
  # Local LLM for development/testing
  ollama:
    image: ollama/ollama:latest
    container_name: ticket_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - main_network
    command: serve

  # Redis for AI response caching
  redis:
    image: redis:alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  redis_data:

networks:
  main_network:
    external: true
